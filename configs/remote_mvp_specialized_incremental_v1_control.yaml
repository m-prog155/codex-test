app_name: vehicle-license-plate-system-remote-mvp-specialized-incremental-v1-control
vehicle_detector:
  model_path: yolo26n.pt
  confidence: 0.35
  device: cpu
  labels:
    - car
    - bus
    - truck
    - motorcycle
plate_detector:
  model_path: /root/autodl-tmp/car-project/runs/plate_detector/ccpd_yolo26n_mvp/weights/best.pt
  confidence: 0.25
  device: cpu
  labels:
    - plate
ocr:
  language: ch
  use_angle_cls: false
  mode: specialized
  model_dir: /root/autodl-tmp/car-project/outputs/plate_ocr_runs/plate_specialized_incremental_v1/inference
  character_dict_path: /root/autodl-tmp/car-project/outputs/plate_ocr_incremental_v1/dicts/plate_dict.txt
  min_confidence: 0.87
  enable_rectification: false
  rectification_mode: disabled
  crop_pad_x_ratio: 0.0
  crop_pad_y_ratio: 0.0
output:
  directory: /root/autodl-tmp/car-project/outputs
  save_images: true
  save_video: true
